{% extends "base.html" %}
{% block title %}Edit Product{% endblock %}
{% block content %}
<div class="page-header">
  <h2>✏️ Edit Product</h2>
  <a href="{{ url_for('seller_products') }}" class="btn btn-outline">← Back</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group flex1">
        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group flex1">
        <label>Category</label>
        <select name="category">
          {% for cat in ['Electronics','Fashion','Home & Kitchen','Sports','Books','Beauty','Software','Education','Health','Toys','Automotive','Garden','Food','Cloud','Marketing'] %}
          <option {{ 'selected' if cat == product.category else '' }}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group flex1">
        <label>Price ($)</label>
        <input type="number" name="price" value="{{ product.price }}" step="0.01" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group flex1">
        <label>Stock</label>
        <input type="number" name="stock" value="{{ product.stock }}" min="0" required>
      </div>
      <div class="form-group flex1">
        <label>Discount (%)</label>
        <input type="number" name="discount" value="{{ product.get('discount',0) }}" min="0" max="90">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="4">{{ product.description }}</textarea>
    </div>
    <div class="form-btns">
      <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      <a href="{{ url_for('seller_products') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
